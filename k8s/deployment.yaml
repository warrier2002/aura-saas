apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-postgres
  template:
    metadata:
      labels:
        app: crm-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "crm_user"
        - name: POSTGRES_PASSWORD
          value: "crm_password"
        - name: POSTGRES_DB
          value: "crm_db"
        ports:
        - containerPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-backend
  template:
    metadata:
      labels:
        app: crm-backend
    spec:
      containers:
      - name: backend
        image: crm-tool-backend:latest
        imagePullPolicy: Never
        env:
        - name: DB_HOST
          value: "crm-postgres"
        - name: DB_USER
          value: "crm_user"
        - name: DB_PASSWORD
          value: "crm_password"
        - name: DB_NAME
          value: "crm_db"
        ports:
        - containerPort: 3001
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-frontend
  template:
    metadata:
      labels:
        app: crm-frontend
    spec:
      containers:
      - name: frontend
        image: crm-tool-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

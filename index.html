<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura SaaS Platform</title>
    <!-- Modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .glow-1, .glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.3;
            z-index: 0;
            border-radius: 50%;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: #c026d3; }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            z-index: 1;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2 {
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        /* Forms & Inputs */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        /* Alert Box */
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }
        .alert.error { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: #fca5a5; }
        .alert.success { background: rgba(34, 197, 94, 0.2); border: 1px solid var(--success); color: #86efac; }

        /* Dashboard Layout */
        #dashboard { display: none; }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .user-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid var(--primary);
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #c7d2fe;
        }

        .btn-small {
            width: auto;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--glass-border);
        }
        .btn-small:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            margin-top: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        
        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }
        
        th {
            background: rgba(255,255,255,0.05);
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
        
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="container">
        
        <!-- LOGIN VIEW -->
        <div id="login-view" class="glass-panel">
            <center>
                <h1>Aura SaaS</h1>
                <p class="subtitle">Secure Multi-Tenant Cloud Platform</p>
            </center>

            <div id="login-alert" class="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Tenant Workspace</label>
                    <select id="tenant" required>
                        <option value="tenant_a">Tenant A (Enterprise)</option>
                        <option value="tenant_b">Tenant B (Startup)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="admin@tenant-a.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Authenticate</button>
            </form>
            <center style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted);">
                Test accounts: admin@tenant-a.com / admin@tenant-b.com | Password: Admin@123
            </center>
        </div>

        <!-- DASHBOARD VIEW -->
        <div id="dashboard" class="glass-panel">
            <div class="dashboard-header">
                <div>
                    <h2>Customer CRM</h2>
                    <span class="user-badge" id="user-info">Logged in as ...</span>
                </div>
                <button class="btn-small" onclick="logout()">Sign Out</button>
            </div>

            <div id="dash-alert" class="alert"></div>

            <div class="two-col">
                <!-- Add Customer Form -->
                <div>
                    <h3 style="margin-bottom:1rem; font-size:1.1rem; color:var(--text-main);">Add Customer</h3>
                    <form id="customer-form">
                        <div class="form-group">
                            <input type="text" id="cust-name" placeholder="Full Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="cust-email" placeholder="Email Address">
                        </div>
                        <div class="form-group">
                            <input type="text" id="cust-company" placeholder="Company Name">
                        </div>
                        <button type="submit">Add to CRM</button>
                    </form>
                </div>

                <!-- Customer List -->
                <div>
                    <h3 style="margin-bottom:1rem; font-size:1.1rem; color:var(--text-main);">Tenant Directory</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Company</th>
                                </tr>
                            </thead>
                            <tbody id="customer-list">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = '/api'; // Uses relative path for Nginx ingress
        
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard');
        const loginAlert = document.getElementById('login-alert');
        const dashAlert = document.getElementById('dash-alert');
        
        function showAlert(element, msg, type) {
            element.textContent = msg;
            element.className = `alert ${type}`;
            element.style.display = 'block';
            setTimeout(() => { element.style.display = 'none'; }, 4000);
        }

        function getAuthHeader() {
            const token = sessionStorage.getItem('aura_token');
            return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
        }

        // --- Auth Logic ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const tenant_id = document.getElementById('tenant').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, tenant_id })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                
                sessionStorage.setItem('aura_token', data.token);
                sessionStorage.setItem('aura_user', JSON.stringify(data.user));
                
                showDashboard();
            } catch (err) {
                showAlert(loginAlert, err.message, 'error');
            }
        });

        function logout() {
            sessionStorage.removeItem('aura_token');
            sessionStorage.removeItem('aura_user');
            loginView.style.display = 'block';
            dashboardView.style.display = 'none';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // --- Dashboard Logic ---
        async function showDashboard() {
            loginView.style.display = 'none';
            dashboardView.style.display = 'block';
            
            const user = JSON.parse(sessionStorage.getItem('aura_user'));
            document.getElementById('user-info').textContent = `${user.name} (${user.tenant_id.replace('_', ' ').toUpperCase()})`;
            
            await fetchCustomers();
        }

        async function fetchCustomers() {
            try {
                const res = await fetch(`${API_BASE}/customers`, { headers: getAuthHeader() });
                if (res.status === 401) return logout(); // Token expired
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                
                const tbody = document.getElementById('customer-list');
                tbody.innerHTML = '';
                
                if (!data.customers || data.customers.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#94a3b8;">No customers found.</td></tr>`;
                    return;
                }

                data.customers.forEach(c => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <div style="font-weight:600; color:#fff;">${escapeHTML(c.name)}</div>
                            <div style="font-size:0.8rem; color:#94a3b8;">${escapeHTML(c.email || '—')}</div>
                        </td>
                        <td>${escapeHTML(c.company || '—')}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                showAlert(dashAlert, 'Failed to fetch directory', 'error');
            }
        }

        document.getElementById('customer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('cust-name').value;
            const email = document.getElementById('cust-email').value;
            const company = document.getElementById('cust-company').value;

            try {
                const res = await fetch(`${API_BASE}/customers`, {
                    method: 'POST',
                    headers: getAuthHeader(),
                    body: JSON.stringify({ name, email, company })
                });
                
                if (res.status === 401) return logout();
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                
                showAlert(dashAlert, 'Customer added successfully', 'success');
                document.getElementById('customer-form').reset();
                await fetchCustomers();
            } catch (err) {
                showAlert(dashAlert, err.message, 'error');
            }
        });

        // XSS Prevention helper
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // Initial check
        if (sessionStorage.getItem('aura_token')) {
            showDashboard();
        }
    </script>
</body>
</html>

{{- if not .Values.db.host }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-postgres
  labels:
    app: crm-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-postgres
  template:
    metadata:
      labels:
        app: crm-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: {{ .Values.db.username | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.db.password | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.db.name | quote }}
        ports:
        - containerPort: 5432
{{- end }}

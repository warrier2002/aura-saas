apiVersion: v1
kind: Service
metadata:
  name: crm-backend
spec:
  selector:
    app: crm-backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: crm-frontend
spec:
  selector:
    app: crm-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
{{- if not .Values.db.host }}
apiVersion: v1
kind: Service
metadata:
  name: crm-postgres
spec:
  selector:
    app: crm-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
{{- end }}

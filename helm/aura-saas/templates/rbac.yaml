apiVersion: v1
kind: ServiceAccount
metadata:
  name: crm-backend-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crm-backend-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crm-backend-rolebinding
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: crm-backend-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: crm-backend-role
  apiGroup: rbac.authorization.k8s.io

name: "Security & Health Monitor"

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  security-audit:
    name: "🛡️ Security Audits"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node npm audit
        working-directory: server
        run: |
          npm ci
          npm audit --audit-level=high || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python Bandit Scan
        run: |
          python -m pip install bandit
          bandit -r assignment.py || true

  health-check:
    name: "🔍 Live Health Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Check Prod URL
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://aurasaas.duckdns.org/" || true)
          echo "Prod Status: $STATUS"
          if [ "$STATUS" != "200" ]; then 
            echo "Prod environment is unreachable!"
            exit 1
          fi
          
      - name: Check Dev URL
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://aurasaas.duckdns.org/dev/" || true)
          echo "Dev Status: $STATUS"
          if [ "$STATUS" != "200" ]; then 
            echo "Dev environment is unreachable!"
            exit 1
          fi

      - name: Check Staging URL
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://aurasaas.duckdns.org/staging/" || true)
          echo "Staging Status: $STATUS"
          if [ "$STATUS" != "200" ]; then 
            echo "Staging environment is unreachable!"
            exit 1
          fi

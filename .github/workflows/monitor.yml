# ─────────────────────────────────────────────────────────────────────────────
# Workflow 3: Monitor — Continuous Health & Security Monitoring
# Runs on a schedule (every 30 minutes) and on every push to main.
# Checks: app health, API auth enforcement, security headers,
# dependency vulnerabilities, and token validation.
# ─────────────────────────────────────────────────────────────────────────────
name: Monitor — Health & Security

on:
  schedule:
    # Every 30 minutes, all day
    - cron: "*/30 * * * *"
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    inputs:
      target_url:
        description: "Override the app URL to monitor"
        required: false
        default: ""

jobs:
  # ── Dependency Vulnerability Scan ──────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Audit Python dependencies with pip-audit
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt --format=columns || {
            echo "⚠️  Python vulnerabilities found — review above"
            exit 1
          }
          echo "✓ No Python vulnerabilities found"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit Node.js dependencies
        working-directory: server
        run: |
          npm audit --audit-level=high 2>&1 || {
            echo "⚠️  High/Critical Node vulnerabilities found"
            exit 1
          }
          echo "✓ No high/critical Node vulnerabilities found"

  # ── Code Security Scan ─────────────────────────────────────────────────────
  security-scan:
    name: Static Security Analysis (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bandit (Python SAST)
        run: pip install bandit --quiet

      - name: Run Bandit on Flask backend
        run: |
          bandit -r assignment.py \
            --severity-level medium \
            --confidence-level medium \
            -f txt 2>&1 | tee bandit-report.txt
          # Fail if HIGH severity issues found
          if grep -q "Severity: High" bandit-report.txt; then
            echo "❌ HIGH severity security issues found!"
            cat bandit-report.txt
            exit 1
          fi
          echo "✓ No high-severity security issues found"

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.txt
          retention-days: 30

  # ── JWT Secret Strength Check ───────────────────────────────────────────────
  secret-strength-check:
    name: JWT Secret Strength Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check JWT secret is not the default dev value
        run: |
          python3 - <<'EOF'
          import re

          WEAK_DEFAULTS = [
              'aura-super-secret-jwt-key-2026-change-in-prod',
              'super-secret-jwt-key-2026',
              'secret',
              'changeme',
              'your-secret',
          ]

          with open('assignment.py') as f:
              code = f.read()
          with open('server/index.js') as f:
              js_code = f.read()

          issues = []
          for weak in WEAK_DEFAULTS:
              if weak in code:
                  issues.append(f"assignment.py contains weak JWT secret: '{weak}'")
              if weak in js_code:
                  issues.append(f"server/index.js contains weak JWT secret: '{weak}'")

          if issues:
              print("⚠️  JWT SECRET WARNINGS:")
              for i in issues:
                  print(f"   • {i}")
              print("")
              print("ACTION REQUIRED: Set JWT_SECRET as a GitHub repository secret")
              print("  Go to: Settings > Secrets and variables > Actions > New secret")
              print("  Name:  JWT_SECRET")
              print("  Value: (generate with: python3 -c \"import secrets; print(secrets.token_hex(32))\")")
              # Warning only, do not fail CI for this (it may be local dev file)
          else:
              print("✓ No hardcoded weak JWT secrets detected in source")
          EOF

  # ── Live Application Health Monitor ────────────────────────────────────────
  health-monitor:
    name: Live App Health Check
    runs-on: ubuntu-latest
    if: vars.APP_URL != '' || vars.BACKEND_URL != ''
    continue-on-error: true  # Don't block other jobs if server isn't deployed yet

    steps:
      - name: Determine target URLs
        id: urls
        run: |
          BACKEND="${{ inputs.target_url || vars.BACKEND_URL || 'http://localhost:3001' }}"
          FRONTEND="${{ vars.APP_URL || 'http://localhost:80' }}"
          echo "BACKEND=$BACKEND"  >> $GITHUB_OUTPUT
          echo "FRONTEND=$FRONTEND" >> $GITHUB_OUTPUT

      - name: Check backend root endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "${{ steps.urls.outputs.BACKEND }}/")
          echo "Backend root: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Backend root returned $STATUS"
          else
            echo "✓ Backend root: OK"
          fi

      - name: Check unauthenticated access is rejected
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "${{ steps.urls.outputs.BACKEND }}/get_items")
          echo "Unauthenticated /get_items: HTTP $STATUS"
          if [ "$STATUS" = "401" ]; then
            echo "✓ Auth enforcement: PASS (got 401)"
          else
            echo "❌ Auth enforcement: FAIL (expected 401, got $STATUS)"
            exit 1
          fi

      - name: Verify security headers on frontend
        run: |
          python3 - <<'PYEOF'
          import urllib.request, sys

          url = "${{ steps.urls.outputs.FRONTEND }}"
          try:
              req  = urllib.request.Request(url)
              resp = urllib.request.urlopen(req, timeout=10)
              headers = dict(resp.headers)
          except Exception as e:
              print(f"Could not reach frontend: {e}")
              sys.exit(0)   # Non-fatal if not deployed yet

          EXPECTED_HEADERS = {
              'X-Content-Type-Options': 'nosniff',
              'X-Frame-Options': 'DENY',
              'X-XSS-Protection': '1; mode=block',
          }

          all_ok = True
          for h, v in EXPECTED_HEADERS.items():
              if h in headers:
                  print(f"✓ {h}: {headers[h]}")
              else:
                  print(f"⚠️  Missing security header: {h}")
                  all_ok = False

          if not all_ok:
              print("\nConsider adding security headers to your nginx/server config")
          else:
              print("\n✓ All security headers present")
          PYEOF

      - name: Full auth flow smoke test
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.error, json, sys

          BASE = "${{ steps.urls.outputs.BACKEND }}"

          def post_json(path, payload):
              data = json.dumps(payload).encode()
              req  = urllib.request.Request(
                  f"{BASE}{path}", data=data,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              try:
                  resp = urllib.request.urlopen(req, timeout=10)
                  return resp.status, json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read())
              except Exception as e:
                  return 0, {"error": str(e)}

          # 1. Register a monitor user
          status, data = post_json("/signup", {
              "name": "Monitor Bot",
              "email": "monitor@ci.aura.dev",
              "password": "MonitorPass123",
              "tenant_id": "a"
          })
          if status in (201, 409):   # 409 = already registered from prev run
              token = data.get("token")
              if status == 409:
                  # Try login instead
                  s2, d2 = post_json("/login", {
                      "email": "monitor@ci.aura.dev",
                      "password": "MonitorPass123",
                      "tenant_id": "a"
                  })
                  token = d2.get("token")
          else:
              print(f"⚠️  Signup returned {status}: {data}")
              sys.exit(0)

          if not token:
              print("⚠️  No token returned — skipping auth flow test")
              sys.exit(0)

          # 2. Fetch catalog with token
          req = urllib.request.Request(
              f"{BASE}/get_items",
              headers={"Authorization": f"Bearer {token}"}
          )
          try:
              resp  = urllib.request.urlopen(req, timeout=10)
              items = json.loads(resp.read()).get("Items", [])
              print(f"✓ Authenticated /get_items: {len(items)} items returned")
          except Exception as e:
              print(f"⚠️  /get_items failed: {e}")

          print("✅ Auth smoke test complete")
          PYEOF

  # ── Summary Report ──────────────────────────────────────────────────────────
  monitoring-report:
    name: Monitoring Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, security-scan, secret-strength-check, health-monitor]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## 📊 Monitoring Report — $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo ""
          echo "| Check                  | Status |"
          echo "|------------------------|--------|"
          echo "| Dependency Audit       | ${{ needs.dependency-audit.result }} |"
          echo "| Static Security (SAST) | ${{ needs.security-scan.result }} |"
          echo "| Secret Strength        | ${{ needs.secret-strength-check.result }} |"
          echo "| Live Health Monitor    | ${{ needs.health-monitor.result }} |"
          echo ""
          if [[ "${{ needs.dependency-audit.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}"  == "failure" ]]; then
            echo "❌ Critical issues found — investigate immediately"
            exit 1
          else
            echo "✅ All critical checks passed"
          fi

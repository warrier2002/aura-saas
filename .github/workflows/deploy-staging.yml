# =============================================================================
# GitHub Actions — Deploy Workflow
# Aura Cloud SaaS | MCA Major Project | 23ONMCR-753
# =============================================================================
#
# ONLY SECRETS THE DEVELOPER NEEDS TO ADD TO GITHUB:
#   AWS_ACCESS_KEY_ID     — your AWS IAM access key
#   AWS_SECRET_ACCESS_KEY — your AWS IAM secret key
#   AWS_REGION            — e.g. us-east-1
#
# EVERYTHING ELSE IS AUTO-GENERATED:
#   EC2 public IP     — from terraform output ec2_public_ip
#   SSH private key   — from terraform output ssh_private_key
#   RDS endpoint      — from terraform output rds_endpoint
#   DB password       — from terraform output db_password
#   JWT secret        — from terraform output jwt_secret
#   DB username       — from terraform output db_username
#   DB name           — from terraform output db_name
#
# PIPELINE FLOW:
#   1. provision   — terraform apply: creates EC2 + RDS + SSH key
#   2. build-push  — docker build + push to GHCR
#   3. db-init     — run DB schema migration on fresh RDS
#   4. deploy      — helm upgrade on EC2 via SSH
#   5. verify      — smoke tests
# =============================================================================

name: "Deploy STAGING"

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      destroy:
        description: "Type DESTROY to tear down all AWS infrastructure"
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a running deploy

jobs:
  # ── Python / Flask Backend ──────────────────────────────────────────────────
  python-ci:
    name: Python CI (Flask Backend)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; warn on style
          flake8 assignment.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 assignment.py --count --max-complexity=10 --max-line-length=120 --statistics || true

      - name: Run import/syntax check
        run: python -c "import py_compile; py_compile.compile('assignment.py'); print('Syntax OK')"

      - name: Run Flask security checks
        run: |
          python3 - <<'EOF'
          import jwt, werkzeug.security as ws
          from datetime import datetime, timedelta, timezone

          # 1. Verify password hashing works
          h = ws.generate_password_hash('TestPass123')
          assert ws.check_password_hash(h, 'TestPass123'), "Correct password should match"
          assert not ws.check_password_hash(h, 'WrongPass'), "Wrong password should not match"
          print("✓ Password hashing: PASS")

          # 2. Verify JWT round-trip
          secret = 'test-secret-for-ci'
          token = jwt.encode(
              {'sub': 'test@ci.com', 'tenant': 'a', 'exp': datetime.now(tz=timezone.utc) + timedelta(hours=1)},
              secret, algorithm='HS256'
          )
          decoded = jwt.decode(token, secret, algorithms=['HS256'])
          assert decoded['sub'] == 'test@ci.com', "JWT sub should match"
          assert decoded['tenant'] == 'a', "JWT tenant should match"
          print("✓ JWT encode/decode: PASS")

          # 3. Verify tampered token is rejected
          try:
              jwt.decode(token[:-3] + 'XXX', secret, algorithms=['HS256'])
              raise AssertionError("Tampered token should be rejected")
          except jwt.PyJWTError:
              print("✓ Tampered token rejected: PASS")

          # 4. Verify expired token is rejected
          expired = jwt.encode(
              {'sub': 'x@x.com', 'tenant': 'a', 'exp': datetime.now(tz=timezone.utc) - timedelta(seconds=1)},
              secret, algorithm='HS256'
          )
          try:
              jwt.decode(expired, secret, algorithms=['HS256'])
              raise AssertionError("Expired token should be rejected")
          except jwt.ExpiredSignatureError:
              print("✓ Expired token rejected: PASS")

          print("\n✅ All security checks passed!")
          EOF

  # ── Node.js / Express Backend ───────────────────────────────────────────────
  node-ci:
    name: Node.js CI (Express Backend)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Node dependencies
        working-directory: server
        run: npm ci

      - name: Audit for vulnerabilities
        working-directory: server
        run: npm audit --audit-level=high

      - name: Syntax check
        working-directory: server
        run: node --check index.js && echo "✓ Syntax OK"

      - name: JWT & bcrypt integration test
        working-directory: server
        run: |
          node - <<'EOF'
          const bcrypt = require('bcryptjs');
          const jwt    = require('jsonwebtoken');

          (async () => {
            const SECRET = 'ci-test-secret';

            // 1. bcrypt hash & verify
            const hash = await bcrypt.hash('TestPass123', 10);
            const ok   = await bcrypt.compare('TestPass123', hash);
            const fail = await bcrypt.compare('WrongPass',   hash);
            console.assert(ok,   'Correct password should match');
            console.assert(!fail,'Wrong password should not match');
            console.log('✓ bcrypt hash/verify: PASS');

            // 2. JWT round-trip
            const token = jwt.sign({ sub: 'ci@test.com', tenant: 'a' }, SECRET, { expiresIn: '1h' });
            const data  = jwt.verify(token, SECRET);
            console.assert(data.sub    === 'ci@test.com', 'JWT sub mismatch');
            console.assert(data.tenant === 'a',           'JWT tenant mismatch');
            console.log('✓ JWT sign/verify: PASS');

            // 3. Tampered token rejected
            try {
              jwt.verify(token.slice(0, -3) + 'XXX', SECRET);
              throw new Error('Should have thrown');
            } catch (e) {
              if (e.name !== 'JsonWebTokenError') throw e;
              console.log('✓ Tampered token rejected: PASS');
            }

            console.log('\n✅ All Node.js security checks passed!');
          })();
          EOF

  # ── Frontend HTML Validation ────────────────────────────────────────────────
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html exists and has required security features
        run: |
          python3 - <<'EOF'
          with open('index.html', 'r') as f:
              content = f.read()

          checks = {
              'Login View present':              'login-view' in content,
              'Authorization header used':       'Authorization' in content,
              'sessionStorage used':             'sessionStorage' in content,
              'escapeHTML XSS prevention':       'escapeHTML' in content,
              'Logout handler present':          'logout()' in content,
              '401 auto-logout present':         "status === 401" in content,
          }

          all_pass = True
          for check, result in checks.items():
              status = '✓' if result else '✗'
              print(f"  {status} {check}")
              if not result:
                  all_pass = False

          if not all_pass:
              raise SystemExit("Some frontend security checks failed!")
          print("\n✅ All frontend security checks passed!")
          EOF

  # ── Terraform Validation ────────────────────────────────────────────────────
  terraform-ci:
    name: Terraform CI (fmt, validate, plan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: terraform init -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: terraform plan


  # ===========================================================================
  # JOB 1: PROVISION INFRASTRUCTURE WITH TERRAFORM
  # Creates EC2, RDS, Security Groups, SSH Key — auto-fetches all values
  # ===========================================================================
  provision:
    needs: build-push
    name: "☁️ Provision AWS Infrastructure (Terraform)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      ec2_public_ip: ${{ steps.tf-outputs.outputs.ec2_public_ip }}
      ec2_dns:       ${{ steps.tf-outputs.outputs.ec2_dns }}
      rds_endpoint:  ${{ steps.tf-outputs.outputs.rds_endpoint }}
      db_name:       ${{ steps.tf-outputs.outputs.db_name }}
      db_username:   ${{ steps.tf-outputs.outputs.db_username }}
      deploy_user:   ${{ steps.tf-outputs.outputs.deploy_user }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Bootstrap Terraform State Bucket
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: |
          BUCKET="aura-saas-tfstate"
          REGION="${{ secrets.AWS_REGION }}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo ">>> State bucket $BUCKET already exists"
          else
            echo ">>> Creating Terraform state bucket: $BUCKET"
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"                 --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
            aws s3api put-public-access-block --bucket "$BUCKET" --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          fi

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: terraform init -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
          TF_VAR_aws_region:     ${{ secrets.AWS_REGION }}
        run: |
          terraform workspace select staging || terraform workspace new staging
          terraform plan -var-file="environments/staging.tfvars" -var="aws_region=${{ secrets.AWS_REGION }}" -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.destroy != 'DESTROY'
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: |
          terraform workspace select staging || terraform workspace new staging
          terraform apply -auto-approve tfplan

      - name: Capture Terraform Outputs
        id: tf-outputs
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: |
          terraform workspace select staging > /dev/null 2>&1 || true
          EC2_IP=$(terraform output -raw ec2_public_ip)
          EC2_DNS=$(terraform output -raw ec2_public_dns)
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          DB_NAME=$(terraform output -raw db_name)
          DB_USERNAME=$(terraform output -raw db_username)
          DEPLOY_USER=$(terraform output -raw deploy_user)

          echo "ec2_public_ip=$EC2_IP"  >> $GITHUB_OUTPUT
          echo "ec2_dns=$EC2_DNS"       >> $GITHUB_OUTPUT
          echo "rds_endpoint=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
          echo "db_name=$DB_NAME"       >> $GITHUB_OUTPUT
          echo "db_username=$DB_USERNAME" >> $GITHUB_OUTPUT
          echo "deploy_user=$DEPLOY_USER" >> $GITHUB_OUTPUT
          
          SSH_KEY=$(terraform output -raw ssh_private_key)
          echo "::add-mask::$SSH_KEY"
          echo "SSH_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          echo "$SSH_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Wait for EC2 Bootstrap
        run: |
          EC2_IP="${{ steps.tf-outputs.outputs.ec2_public_ip }}"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

          for i in $(seq 1 20); do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ec2-user@"$EC2_IP" "test -f ~/bootstrap_done.txt && echo ready" 2>/dev/null | grep -q ready; then
              echo ">>> EC2 bootstrap complete!"
              break
            fi
            sleep 30
          done

  # ===========================================================================
  # JOB 4: DB INIT
  # ===========================================================================
  db-init:
    name: "🗄️ Initialize RDS Database Schemas"
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Restore Terraform Outputs
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: |
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}" -input=false
          terraform workspace select staging > /dev/null 2>&1 || true
          
          DB_PASSWORD=$(terraform output -raw db_password)
          SSH_KEY=$(terraform output -raw ssh_private_key)
          
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          echo "::add-mask::$SSH_KEY"
          echo "SSH_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          echo "$SSH_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Set up SSH connection
        run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run DB Init Script via EC2
        run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          RDS_ENDPOINT="${{ needs.provision.outputs.rds_endpoint }}"
          DB_NAME="${{ needs.provision.outputs.db_name }}"
          DB_USER="${{ needs.provision.outputs.db_username }}"
          
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no scripts/db_init.sql ec2-user@"$EC2_IP":~/db_init.sql
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@"$EC2_IP" "export PGPASSWORD=\"${DB_PASSWORD}\"; psql -h \"${RDS_ENDPOINT}\" -U \"${DB_USER}\" -d \"${DB_NAME}\" -f ~/db_init.sql" 

  # ===========================================================================
  # JOB 5: HELM DEPLOY
  # ===========================================================================
  helm-deploy:
    name: "🚀 Helm Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [build-push, provision, db-init]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Restore Sensitive Outputs
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: |
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}" -input=false
          terraform workspace select staging > /dev/null 2>&1 || true
          
          DB_PASSWORD=$(terraform output -raw db_password)
          JWT_SECRET=$(terraform output -raw jwt_secret)
          SSH_KEY=$(terraform output -raw ssh_private_key)
          
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          echo "::add-mask::$JWT_SECRET"
          echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV
          echo "::add-mask::$SSH_KEY"
          echo "SSH_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          echo "$SSH_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload Helm chart to EC2
        run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r helm/ ec2-user@"$EC2_IP":~/helm/

      - name: Run Helm Deploy on EC2
        run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          RDS_ENDPOINT="${{ needs.provision.outputs.rds_endpoint }}"
          DB_NAME="${{ needs.provision.outputs.db_name }}"
          DB_USER="${{ needs.provision.outputs.db_username }}"
          IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"
          REPO="ghcr.io/${{ github.repository }}"
          
          cat << 'EOF' > deploy.sh
          set -e
          export KUBECONFIG=/home/ec2-user/.kube/config
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm upgrade --install aura-saas ~/helm/aura-saas \
            --namespace crm-staging \
            -f ~/helm/aura-saas/values.staging.yaml \
            --create-namespace \
            --set backend.image.repository="${REPO}/crm-backend" \
            --set backend.image.tag="${IMAGE_TAG}" \
            --set frontend.image.repository="${REPO}/crm-frontend" \
            --set frontend.image.tag="${IMAGE_TAG}" \
            --set db.host="${RDS_ENDPOINT}" \
            --set db.name="${DB_NAME}" \
            --set db.username="${DB_USER}" \
            --set db.password="${DB_PASSWORD}" \
            --set jwtSecret="${JWT_SECRET}" \
            --set ingress.host="${EC2_IP}" \
            --wait --timeout 8m
          kubectl get pods -n crm-staging
          EOF
          
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.sh ec2-user@"$EC2_IP":~/deploy.sh
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@"$EC2_IP" "bash ~/deploy.sh"

  # ===========================================================================
  # JOB 6: MONITOR
  # ===========================================================================
  monitor:
    name: "🔍 Verify Deployment"
    runs-on: ubuntu-latest
    needs: [helm-deploy, provision]
    steps:
      - name: Verify Web App is Online
        run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          echo ">>> Pinging http://$EC2_IP/login"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$EC2_IP/login" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Success! Received HTTP 200 OK."
              exit 0
            fi
            sleep 15
          done
          echo "❌ ERROR: Web App failed to return HTTP 200 OK within 3 minutes!"
          exit 1

name: "Reusable Deploy Environment"

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy to (dev, staging, prod)"
        required: true
        type: string
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        type: string

jobs:
  # ===========================================================================
  # STAGE 1: PROVISION INFRASTRUCTURE
  # ===========================================================================
  provision:
    name: "☁️ Provision AWS Infra (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    outputs:
      ec2_public_ip: ${{ steps.tf.outputs.ec2_public_ip }}
      rds_endpoint:  ${{ steps.tf.outputs.rds_endpoint }}
      db_name:       ${{ steps.tf.outputs.db_name }}
      db_username:   ${{ steps.tf.outputs.db_username }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false
      - working-directory: terraform
        run: |
          BUCKET="aura-saas-tfstate"
          REGION="${{ secrets.AWS_REGION }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
          fi
          
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform workspace select ${{ inputs.environment }} || terraform workspace new ${{ inputs.environment }}

          terraform apply -auto-approve -var-file="environments/${{ inputs.environment }}.tfvars" -var="aws_region=${{ secrets.AWS_REGION }}"

      - id: tf
        working-directory: terraform
        run: |
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform workspace select ${{ inputs.environment }} > /dev/null 2>&1 || true
          
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT
          echo "db_name=$(terraform output -raw db_name)" >> $GITHUB_OUTPUT
          echo "db_username=$(terraform output -raw db_username)" >> $GITHUB_OUTPUT

          SSH_KEY=$(terraform output -raw ssh_private_key)
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          EC2_IP=$(terraform output -raw ec2_public_ip)
          BOOTSTRAP_SUCCESS=false
          for i in $(seq 1 20); do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ec2-user@"$EC2_IP" "test -f ~/bootstrap_done.txt && echo ready" 2>/dev/null | grep -q ready; then
              echo ">>> EC2 bootstrap complete!"
              BOOTSTRAP_SUCCESS=true
              break
            fi
            sleep 30
          done
          
          if [ "$BOOTSTRAP_SUCCESS" = "false" ]; then
            echo "❌ ERROR: EC2 bootstrap timed out or failed!"
            echo ">>> Fetching cloud-init logs for debugging..."
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@"$EC2_IP" "sudo cat /var/log/cloud-init-output.log" || true
            exit 1
          fi

  # ===========================================================================
  # STAGE 2: INITIALIZE DATABASE
  # ===========================================================================
  db-init:
    needs: provision
    name: "🗄️ Init DB Schemas (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false
      - working-directory: terraform
        run: |
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform workspace select ${{ inputs.environment }} > /dev/null 2>&1 || true
          
          DB_PASSWORD=$(terraform output -raw db_password)
          SSH_KEY=$(terraform output -raw ssh_private_key)
          
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          echo "RDS_ENDPOINT=$RDS_ENDPOINT" >> $GITHUB_ENV
          
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
      - run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          DB_NAME="${{ needs.provision.outputs.db_name }}"
          DB_USER="${{ needs.provision.outputs.db_username }}"
          
          ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no scripts/db_init.sql ec2-user@"$EC2_IP":~/db_init.sql
          
          cat << EOF > run_db_init.sh
          export PGPASSWORD="${DB_PASSWORD}"
          docker run --rm -v ~/db_init.sql:/db_init.sql -e PGPASSWORD="${DB_PASSWORD}" postgres:15-alpine psql -h "${RDS_ENDPOINT}" -U "${DB_USER}" -d "${DB_NAME}" -f /db_init.sql
          EOF
          
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no run_db_init.sh ec2-user@"$EC2_IP":~/run_db_init.sh
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@"$EC2_IP" "bash ~/run_db_init.sh"

  # ===========================================================================
  # STAGE 3: HELM DEPLOY
  # ===========================================================================
  helm-deploy:
    needs: [provision, db-init]
    name: "🚀 Helm Deploy (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false
      - working-directory: terraform
        run: |
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform workspace select ${{ inputs.environment }} > /dev/null 2>&1 || true
          
          DB_PASSWORD=$(terraform output -raw db_password)
          JWT_SECRET=$(terraform output -raw jwt_secret)
          SSH_KEY=$(terraform output -raw ssh_private_key)
          
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          echo "::add-mask::$JWT_SECRET"
          echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV
          
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          echo "RDS_ENDPOINT=$RDS_ENDPOINT" >> $GITHUB_ENV
          
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          DB_NAME="${{ needs.provision.outputs.db_name }}"
          DB_USER="${{ needs.provision.outputs.db_username }}"
          IMAGE_TAG="${{ inputs.image_tag }}"
          REPO="ghcr.io/${{ github.repository }}"
          
          ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@"$EC2_IP" "mkdir -p ~/helm"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r helm/* ec2-user@"$EC2_IP":~/helm/
          
          cat << EOF > deploy.sh
          set -e
          export KUBECONFIG=/home/ec2-user/.kube/config
          # We do not strictly need docker login if images are public, but keeping it
          # To avoid errors if the image is public, we can just echo skip if no token
          helm upgrade --install aura-saas ~/helm/aura-saas \
            --namespace crm-${{ inputs.environment }} \
            -f ~/helm/aura-saas/values.yaml \
            --create-namespace \
            --set backend.image.repository="${REPO}/crm-backend" \
            --set backend.image.tag="${IMAGE_TAG}" \
            --set frontend.image.repository="${REPO}/crm-frontend" \
            --set frontend.image.tag="${IMAGE_TAG}" \
            --set db.host="${RDS_ENDPOINT}" \
            --set db.name="${DB_NAME}" \
            --set db.username="${DB_USER}" \
            --set db.password="${DB_PASSWORD}" \
            --set jwtSecret="${JWT_SECRET}" \
            --set ingress.host="${EC2_IP}" \
            --wait --timeout 8m
          kubectl get pods -n crm-${{ inputs.environment }}
          EOF
          
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.sh ec2-user@"$EC2_IP":~/deploy.sh
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@"$EC2_IP" "bash ~/deploy.sh"

  # ===========================================================================
  # STAGE 4: MONITOR
  # ===========================================================================
  monitor:
    needs: [helm-deploy, provision]
    name: "🔍 Monitor Health (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    steps:
      - run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          echo ">>> Pinging http://$EC2_IP/"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$EC2_IP/" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Success! Received HTTP 200 OK."
              exit 0
            fi
            sleep 15
          done
          echo "❌ ERROR: Web App failed to return HTTP 200 OK within 3 minutes!"
          exit 1

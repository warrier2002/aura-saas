name: "Deploy PROD"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      destroy:
        description: "Type DESTROY to tear down all AWS infrastructure"
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # STAGE 1: CI & SECURITY CHECKS
  # ===========================================================================
  python-ci:
    name: "Python CI (Backend)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8
          flake8 assignment.py --count --select=E9,F63,F7,F82 --show-source --statistics
          python -c "import py_compile; py_compile.compile('assignment.py')"

  node-ci:
    name: "Node.js CI (Backend)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: server
        run: |
          npm ci
          npm audit --audit-level=high || true
          node --check index.js

  frontend-ci:
    name: "Frontend CI"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if ! grep -q 'login-view' index.html; then echo "Missing login view"; exit 1; fi
          if ! grep -q 'Authorization' index.html; then echo "Missing Authorization header"; exit 1; fi

  terraform-ci:
    name: "Terraform CI"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - working-directory: terraform
        run: |
          terraform fmt -check
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform validate
          terraform workspace select prod || terraform workspace new prod
          terraform plan -var-file="environments/prod.tfvars" -var="aws_region=${{ secrets.AWS_REGION }}"

  # ===========================================================================
  # STAGE 2: BUILD & PUSH DOCKER IMAGES
  # ===========================================================================
  build-push:
    needs: [python-ci, node-ci, frontend-ci, terraform-ci]
    name: "🐳 Build & Push Images"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "tag=$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/crm-backend:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/crm-backend:latest
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/crm-frontend:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/crm-frontend:latest

  # ===========================================================================
  # STAGE 3: PROVISION INFRASTRUCTURE
  # ===========================================================================
  provision:
    needs: build-push
    name: "☁️ Provision AWS Infra"
    runs-on: ubuntu-latest
    outputs:
      ec2_public_ip: ${{ steps.tf.outputs.ec2_public_ip }}
      rds_endpoint: ${{ steps.tf.outputs.rds_endpoint }}
      db_name: ${{ steps.tf.outputs.db_name }}
      db_username: ${{ steps.tf.outputs.db_username }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false
      - working-directory: terraform
        run: |
          BUCKET="aura-saas-tfstate"
          REGION="${{ secrets.AWS_REGION }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
          fi

          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform workspace select prod || terraform workspace new prod

          if [ "${{ github.event.inputs.destroy }}" = "DESTROY" ]; then
            terraform destroy -auto-approve -var-file="environments/prod.tfvars" -var="aws_region=${{ secrets.AWS_REGION }}"
            exit 0
          fi

          terraform apply -auto-approve -var-file="environments/prod.tfvars" -var="aws_region=${{ secrets.AWS_REGION }}"

      - id: tf
        working-directory: terraform
        run: |
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform workspace select prod > /dev/null 2>&1 || true

          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT
          echo "db_name=$(terraform output -raw db_name)" >> $GITHUB_OUTPUT
          echo "db_username=$(terraform output -raw db_username)" >> $GITHUB_OUTPUT

          SSH_KEY=$(terraform output -raw ssh_private_key)
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          EC2_IP=$(terraform output -raw ec2_public_ip)
          for i in $(seq 1 20); do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ec2-user@"$EC2_IP" "test -f ~/bootstrap_done.txt && echo ready" 2>/dev/null | grep -q ready; then
              echo ">>> EC2 bootstrap complete!"
              break
            fi
            sleep 30
          done

  # ===========================================================================
  # STAGE 4: INITIALIZE DATABASE
  # ===========================================================================
  db-init:
    needs: provision
    if: github.event.inputs.destroy != 'DESTROY'
    name: "🗄️ Init DB Schemas"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false
      - working-directory: terraform
        run: |
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform workspace select prod > /dev/null 2>&1 || true

          DB_PASSWORD=$(terraform output -raw db_password)
          SSH_KEY=$(terraform output -raw ssh_private_key)

          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          RDS_ENDPOINT="${{ needs.provision.outputs.rds_endpoint }}"
          DB_NAME="${{ needs.provision.outputs.db_name }}"
          DB_USER="${{ needs.provision.outputs.db_username }}"

          ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no scripts/db_init.sql ec2-user@"$EC2_IP":~/db_init.sql

          cat << 'EOF' > run_db_init.sh
          export PGPASSWORD="${DB_PASSWORD}"
          psql -h "${RDS_ENDPOINT}" -U "${DB_USER}" -d "${DB_NAME}" -f ~/db_init.sql
          EOF

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no run_db_init.sh ec2-user@"$EC2_IP":~/run_db_init.sh
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@"$EC2_IP" "bash ~/run_db_init.sh"

  # ===========================================================================
  # STAGE 5: HELM DEPLOY
  # ===========================================================================
  helm-deploy:
    needs: [provision, build-push, db-init]
    if: github.event.inputs.destroy != 'DESTROY'
    name: "🚀 Helm Deploy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false
      - working-directory: terraform
        run: |
          terraform init -backend-config="region=${{ secrets.AWS_REGION }}"
          terraform workspace select prod > /dev/null 2>&1 || true

          DB_PASSWORD=$(terraform output -raw db_password)
          JWT_SECRET=$(terraform output -raw jwt_secret)
          SSH_KEY=$(terraform output -raw ssh_private_key)

          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          echo "::add-mask::$JWT_SECRET"
          echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          RDS_ENDPOINT="${{ needs.provision.outputs.rds_endpoint }}"
          DB_NAME="${{ needs.provision.outputs.db_name }}"
          DB_USER="${{ needs.provision.outputs.db_username }}"
          IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"
          REPO="ghcr.io/${{ github.repository }}"

          ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r helm/ ec2-user@"$EC2_IP":~/helm/

          cat << 'EOF' > deploy.sh
          set -e
          export KUBECONFIG=/home/ec2-user/.kube/config
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm upgrade --install aura-saas ~/helm/aura-saas             --namespace crm-prod             -f ~/helm/aura-saas/values.prod.yaml             --create-namespace             --set backend.image.repository="${REPO}/crm-backend"             --set backend.image.tag="${IMAGE_TAG}"             --set frontend.image.repository="${REPO}/crm-frontend"             --set frontend.image.tag="${IMAGE_TAG}"             --set db.host="${RDS_ENDPOINT}"             --set db.name="${DB_NAME}"             --set db.username="${DB_USER}"             --set db.password="${DB_PASSWORD}"             --set jwtSecret="${JWT_SECRET}"             --set ingress.host="${EC2_IP}"             --wait --timeout 8m
          kubectl get pods -n crm-prod
          EOF

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.sh ec2-user@"$EC2_IP":~/deploy.sh
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@"$EC2_IP" "bash ~/deploy.sh"

  # ===========================================================================
  # STAGE 6: MONITOR
  # ===========================================================================
  monitor:
    needs: [helm-deploy, provision]
    if: github.event.inputs.destroy != 'DESTROY'
    name: "🔍 Monitor Health"
    runs-on: ubuntu-latest
    steps:
      - run: |
          EC2_IP="${{ needs.provision.outputs.ec2_public_ip }}"
          echo ">>> Pinging http://$EC2_IP/"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$EC2_IP/" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Success! Received HTTP 200 OK."
              exit 0
            fi
            sleep 15
          done
          echo "❌ ERROR: Web App failed to return HTTP 200 OK within 3 minutes!"
          exit 1

# ─────────────────────────────────────────────────────────────────────────────
# Workflow 2: Deploy
# Runs only on pushes to `main` branch AND after CI passes.
# Builds Docker images, pushes to GitHub Container Registry (GHCR),
# and deploys to the target server via SSH.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy — Build & Ship

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI — Lint & Test"]
    types: [completed]
    branches: [main]

# Only run if CI passed (when triggered via workflow_run)
jobs:
  check-ci:
    name: Verify CI Success
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: CI status confirmed
        run: echo "CI passed — proceeding to deploy."

  # ── Build & Push Docker Images ──────────────────────────────────────────────
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: check-ci
    permissions:
      contents: read
      packages: write  # Needed to push to GHCR

    outputs:
      backend_image:  ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend Image ─────────────────────────────────────────────────────
      - name: Extract metadata for backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/crm-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend Image ────────────────────────────────────────────────────
      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/crm-frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy via SSH ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag from SHA
        id: tag
        run: echo "SHA=$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy containers on remote server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "bash -s" << 'ENDSSH'
            set -e
            echo "=== Logging in to GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "=== Pulling latest images ==="
            docker pull ghcr.io/${{ github.repository }}/crm-backend:latest
            docker pull ghcr.io/${{ github.repository }}/crm-frontend:latest

            echo "=== Stopping old containers ==="
            docker stop crm-backend  2>/dev/null || true
            docker stop crm-frontend 2>/dev/null || true
            docker rm   crm-backend  2>/dev/null || true
            docker rm   crm-frontend 2>/dev/null || true

            echo "=== Starting backend ==="
            docker run -d \
              --name crm-backend \
              --restart unless-stopped \
              -p 3001:3001 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e DB_HOST="${{ secrets.DB_HOST }}" \
              -e DB_USER="${{ secrets.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              ghcr.io/${{ github.repository }}/crm-backend:latest

            echo "=== Starting frontend ==="
            docker run -d \
              --name crm-frontend \
              --restart unless-stopped \
              -p 80:80 \
              ghcr.io/${{ github.repository }}/crm-frontend:latest

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Deployment complete ✅ ==="
          ENDSSH

      - name: Smoke test deployed app
        run: |
          sleep 10  # Give containers time to start
          echo "=== Backend health check ==="
          curl -f -s -o /dev/null -w "Backend HTTP %{http_code}\n" \
            "http://${{ secrets.DEPLOY_HOST }}:3001/" || echo "Backend not reachable (may need VPN/firewall)"
          echo "=== Frontend health check ==="
          curl -f -s -o /dev/null -w "Frontend HTTP %{http_code}\n" \
            "http://${{ secrets.DEPLOY_HOST }}/" || echo "Frontend not reachable"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment SUCCESS"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Actor:   ${{ github.actor }}"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Time:    $(date -u)"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED"
          echo "  Commit: ${{ github.sha }}"
          echo "  Check logs above for details."
